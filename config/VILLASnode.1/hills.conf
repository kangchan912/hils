#############################################################################
# hils.conf — VILLASnode #1 (config/VILLASnode.1)
#
# [Lab C 왕복] webrtc_a 로 돌아오는 EnergyPlus#2(Lab C) 결과를
#   lab_a_mon_c 노드를 통해 Lab A(MATLAB)의 별도 포트(12012)로 왕복시킨다.
#   제어 권한은 여전히 ep(Lab B) 하나이며, Lab C 결과는 참고용으로만 출력.
#
# [신규, REST API] VILLASnode 공식 node-type "api"(HTTP REST 인터페이스,
#   /api/v2/universal/... 경로, 소스 lib/nodes/api.cpp 기준)를 추가.
#   외부에서 REST PUT으로 값을 주입하면(rest_ctrl 노드), 그 값을
#   lab_a_mon_rest 노드를 거쳐 Lab A(MATLAB)의 신규 포트(12013)로 전달된다.
#   이것도 Lab C 와 마찬가지로 제어 루프에는 안 섞이는 "참고/외부주입 표시용"
#   경로로 뒀다 (필요하면 나중에 lab_a 의 setpoint 에도 반영하도록 확장 가능).
#
# lab_a / ep 노드와 그 사이 원본 두 path는 100% 그대로.
#############################################################################

stats = 0
hugepages = 0

http = {
    enabled = true
    port    = 8080
}

logging = {
    level = "info"
}

nodes = {

    lab_a = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:12010"
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }

        out = {
            address = "192.168.239.185:12011"
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }
    }

    ep = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:12003"
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }

        out = {
            address = "192.168.239.185:12001"
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
    }

    webrtc_a = {
        type    = "webrtc"
        session = "hils_special_proposal"
        peer    = "site_a"
        server  = "ws://10.0.30.2:8080"

        format = "villas.human"
        ice = { servers = () }

        in = {
            signals = (
                { name = "indoor_temp_c", type = "float", unit = "degC" },
                { name = "hvac_power_c",  type = "float", unit = "W"    }
            )
        }
        out = {
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
    }

    # ── Lab C(WAN) 결과를 Lab A까지 왕복시키는 참고용 싱크 ──
    lab_a_mon_c = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:15040"   # 미사용 더미
            signals = (
                { name = "indoor_temp_c", type = "float" },
                { name = "hvac_power_c",  type = "float" }
            )
        }
        out = {
            address = "192.168.239.185:12012"
            signals = (
                { name = "indoor_temp_c", type = "float", unit = "degC" },
                { name = "hvac_power_c",  type = "float", unit = "W"    }
            )
        }
    }

    # ── [신규] REST API 외부 제어/조회 진입점 (VILLASnode 공식 "api" 노드타입) ──
    # 엔드포인트: http://<gw1 IP>:8080/api/v2/universal/rest_ctrl/channel/rest_value/sample
    rest_ctrl = {
        type = "api"
        in = {
            signals = (
                {
                    name        = "rest_value"
                    description = "External REST control value"
                    type        = "float"
                    unit        = "degC"
                    rate        = 1.0
                    range       = { min = -50.0, max = 60.0 }
                    readable    = true
                    writable    = true
                    payload     = "samples"
                }
            )
        }
        out = {
            signals = (
                { description = "loopback", rate = 1.0,
                  readable = true, writable = false, payload = "samples" }
            )
        }
    }
    # rest_ctrl = {
    #     type = "api"

    #     in = {
    #         signals = (
    #             {
    #                 name        = "rest_value"
    #                 description = "External REST control value"
    #                 type        = "float"
    #                 unit        = "degC"
    #                 rate        = 1.0
    #                 range       = { min = -50.0, max = 60.0 }
    #                 readable    = true
    #                 writable    = true
    #                 payload     = "samples"    # ← "samples"에서 변경 (upstream 버그 우회)
    #             }
    #         )
    #     }

    #     out = {
    #         signals = (
    #             {
    #                 description = "External REST control value (loopback)"
    #                 rate        = 1.0
    #                 readable    = true
    #                 writable    = false
    #                 payload     = "samples"    # ← 동일하게 변경
    #             }
    #         )
    #     }
    # }

    # ── [신규] REST로 받은 값을 Lab A로 전달하는 싱크 ──
    lab_a_mon_rest = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:15041"   # 미사용 더미
            signals = ( { name = "rest_value", type = "float" } )
        }
        out = {
            address = "192.168.239.185:12013"   # Lab A(MATLAB), 신규 포트
            signals = ( { name = "rest_value", type = "float", unit = "degC" } )
        }
    }
}

paths = (

    # Lab A -> EnergyPlus#1 방향 (원본), 동시에 webrtc_a 로도 fan-out
    {
        in   = "lab_a"
        out  = ["ep", "webrtc_a"]
        hooks = (
            { type = "lua", script = "/config/hooks/lab_a_to_ep.lua", use_names = false }
        )
    },

    # EnergyPlus#1 -> Lab A 방향 (원본)
    {
        in   = "ep"
        out  = "lab_a"
        hooks = (
            { type = "lua", script = "/config/hooks/ep_to_lab_a.lua", use_names = false }
        )
    },

    # Lab C(WAN) 결과 -> Lab A 참고용
    {
        in   = "webrtc_a"
        out  = "lab_a_mon_c"
        hooks = (
            { type = "lua", script = "/config/hooks/ep_to_lab_a.lua", use_names = false }
        )
    },

    # [신규] REST API -> Lab A 참고용 전달
    {
        in  = "rest_ctrl"
        out = ["rest_ctrl", "lab_a_mon_rest"]
    }
)