#############################################################################
# hils.conf — VILLASnode 설정 (config#1, 기존 VILLASnode 호스트)
#
# 9단계 HILS 파이프라인 중 소켓 전송 구간(2,4,6,8단계)을 정의한다.
#
#   [1] Lab A(MATLAB) 임의값 생성
#   [2] Lab A --(소켓, UDP)--> lab_a.in  (VILLASnode 수신)
#   [3] lab_a_to_ep.lua hook  : EnergyPlus용 포맷으로 변환
#   [4] ep.out --(소켓, UDP)--> EnergyPlus  (송신)
#   [5] EnergyPlus(Python 소켓) 수신 + 계산
#   [6] EnergyPlus --(소켓, UDP)--> ep.in  (VILLASnode 수신)
#   [7] ep_to_lab_a.lua hook  : Lab A용 포맷으로 변환
#   [8] lab_a.out --(소켓, UDP)--> Lab A  (송신)
#   [9] Lab A 수신값 반영 → 다음 값 생성 (labA_sim.m 내부 루프)
#
# 포트 흐름 (원본, 변경 없음):
#   Lab A ─12010→ lab_a.in  ─[lab_a_to_ep.lua]→ ep.out  ─12001→ EnergyPlus #1
#   EP#1  ─12003→ ep.in     ─[ep_to_lab_a.lua]→ lab_a.out ─12011→ Lab A
#
# ─────────────────────────────────────────────────────────────────────────
# [특별제안 확장] lab_a/ep 노드와 원본 두 path는 그대로, webrtc_a/mon/ctrl 만 추가.
#
#   webrtc_a.server = ws://192.168.239.186:8080
#     -> VILLASnode #2(config#2) 호스트(192.168.239.186)에서
#        signaling 컨테이너가 8080 포트로 게시되어 있음
#
#   mon/ctrl 은 REST API 사이드카(monitor_api.py)와 통신.
#     이 사이드카는 이 VILLASnode 와 같은 호스트에서 도는 것으로 가정하여
#     127.0.0.1 로 설정함 (다른 호스트에서 돌릴 경우 해당 IP로 교체).
#############################################################################

stats = 1

http = {
    enabled = true
    port    = 8080
}

logging = {
    level = "info"
}

nodes = {

    # ── Lab A (MATLAB) ────────────────────────────────────────────
    # (원본과 100% 동일, 변경 없음)
    lab_a = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:12010"          # [2] Lab A -> VILLASnode 수신 바인드
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }

        out = {
            address = "192.168.239.185:12011"  # [8] VILLASnode -> Lab A 송신 목적지
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }
    }

    # ── Lab B (EnergyPlus #1, Python 소켓) ───────────────────────
    # (원본과 100% 동일, 변경 없음)
    ep = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:12003"          # [6] EnergyPlus#1 -> VILLASnode 수신 바인드
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }

        out = {
            address = "192.168.239.185:12001"  # [4] VILLASnode -> EnergyPlus#1 송신 목적지
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
    }

    # ── [신규] VILLASnode #2(192.168.239.186, config#2) 방향 WebRTC ──
    webrtc_a = {
        type    = "webrtc"
        session = "hils_special_proposal"      # config#2 의 webrtc_c 와 동일해야 함
        peer    = "site_a"
        server  = "ws://192.168.239.186:8080"  # config#2 호스트의 signaling 컨테이너

        format = "villas.human"
        ice = { servers = () }

        in = {
            signals = (
                { name = "indoor_temp_c", type = "float", unit = "degC" },
                { name = "hvac_power_c",  type = "float", unit = "W"    }
            )
        }
        out = {
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
    }

    # ── [신규] REST API 사이드카 모니터링 싱크 ────────────────────────
    mon = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:15029"          # 미사용 더미 (path 의 out 으로만 쓰임)
            signals = (
                { name = "d0", type = "float" }, { name = "d1", type = "float" },
                { name = "d2", type = "float" }, { name = "d3", type = "float" }
            )
        }
        out = {
            address = "127.0.0.1:15020"         # monitor_api.py 가 bind 하는 곳 (같은 호스트 가정)
            signals = (
                { name = "d0", type = "float" }, { name = "d1", type = "float" },
                { name = "d2", type = "float" }, { name = "d3", type = "float" }
            )
        }
    }

    # ── [신규] REST API 외부 제어 진입점 ───────────────────────────────
    ctrl = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:15030"          # monitor_api.py -> 여기로 제어값 주입
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
        out = {
            address = "127.0.0.1:15031"
            signals = ( { name = "ack", type = "float" } )
        }
    }
}

paths = (

    # [3] Lab A -> EnergyPlus#1 방향 (원본 hook 그대로, fan-out만 추가)
    {
        in  = "lab_a"
        out = ["ep", "webrtc_a", "mon"]
        hooks = (
            { type = "lua", script = "/config/hooks/lab_a_to_ep.lua", use_names = false }
        )
    },

    # [7] EnergyPlus#1 -> Lab A 방향 (원본 hook 그대로, fan-out만 추가)
    {
        in  = "ep"
        out = ["lab_a", "mon"]
        hooks = (
            { type = "lua", script = "/config/hooks/ep_to_lab_a.lua", use_names = false }
        )
    },

    # [신규] VILLASnode#2/EnergyPlus#2 결과 수신 -> 모니터링 전용 (제어엔 미반영)
    {
        in  = "webrtc_a"
        out = "mon"
    },

    # [신규] REST 외부 제어 -> VILLASnode#2 방향
    {
        in  = "ctrl"
        out = "webrtc_a"
        hooks = (
            { type = "lua", script = "/config/hooks/lab_a_to_ep.lua", use_names = false }
        )
    }
)