#############################################################################
# hils.conf — VILLASnode 설정
#
# 9단계 HILS 파이프라인 중 소켓 전송 구간(2,4,6,8단계)을 정의한다.
#
#   [1] Lab A(MATLAB) 임의값 생성
#   [2] Lab A --(소켓, UDP)--> lab_a.in  (VILLASnode 수신)
#   [3] lab_a_to_ep.lua hook  : EnergyPlus용 포맷으로 변환
#   [4] ep.out --(소켓, UDP)--> EnergyPlus  (송신)
#   [5] EnergyPlus(Python 소켓) 수신 + 계산
#   [6] EnergyPlus --(소켓, UDP)--> ep.in  (VILLASnode 수신)
#   [7] ep_to_lab_a.lua hook  : Lab A용 포맷으로 변환
#   [8] lab_a.out --(소켓, UDP)--> Lab A  (송신)
#   [9] Lab A 수신값 반영 → 다음 값 생성 (labA_sim.m 내부 루프)
#
# 노드 이름: 소문자 + 숫자 + 언더스코어(_) 만 허용 (대문자·하이픈 불가)
# 소켓 노드: in.address(수신 바인드) + out.address(송신 목적지) 를 한 노드에 정의
#
# 포트 흐름:
#   Lab A ─12010→ lab_a.in  ─[lab_a_to_ep.lua]→ ep.out  ─12001→ EnergyPlus
#   EP    ─12003→ ep.in     ─[ep_to_lab_a.lua]→ lab_a.out ─12011→ Lab A
#
# 신호 채널 순서:
#   Lab A 송신 (4ch): [1]outdoor_temp  [2]solar_rad  [3]rel_humidity  [4]cooling_setpoint
#   EP    송신 (2ch): [1]indoor_temp   [2]hvac_power
#############################################################################

stats = 1

http = {
    enabled = true
    port    = 8080
}

logging = {
    level = "info"
}

nodes = {

    # ── Lab A (MATLAB) ────────────────────────────────────────────
    # [2] 여기로 Lab A가 소켓(UDP)으로 송신 / [8] 여기서 Lab A로 소켓 송신
    lab_a = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:12010"          # [2] Lab A -> VILLASnode 수신 바인드
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }  # 제어입력
            )
        }

        out = {
            address = "192.168.239.185:12011"  # [8] VILLASnode -> Lab A 송신 목적지
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }
    }

    # ── Lab B (EnergyPlus, Python 소켓) ──────────────────────────
    # [4] 여기서 EnergyPlus로 소켓 송신 / [6] 여기로 EnergyPlus가 소켓 수신
    ep = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:12003"          # [6] EnergyPlus -> VILLASnode 수신 바인드
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }

        out = {
            address = "192.168.239.185:12001"  # [4] VILLASnode -> EnergyPlus 송신 목적지
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
    }
}

paths = (

    # [3] Lab A -> EnergyPlus 방향 hook 경로
    {
        in  = "lab_a"
        out = "ep"
        hooks = (
            { type = "lua", script = "/config/hooks/lab_a_to_ep.lua", use_names = false }
        )
    },

    # [7] EnergyPlus -> Lab A 방향 hook 경로
    {
        in  = "ep"
        out = "lab_a"
        hooks = (
            { type = "lua", script = "/config/hooks/ep_to_lab_a.lua", use_names = false }
        )
    }
)
