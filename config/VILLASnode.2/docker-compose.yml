# Host 4 (신규 1개 물리/가상 머신) — signaling + VILLASnode #2 컨테이너
#
# EnergyPlus #2(ep_socket_sim.py)는 EnergyPlus 설치가 필요해서 이 파일에서
# Docker 이미지로 만들지 않고, 이 머신 위에서 별도 가상환경(예: python venv 또는
# 별도 리눅스 사용자 세션)의 "네이티브 프로세스"로 돌리는 걸 권장합니다.
# (Docker화하려면 EnergyPlus 설치 레이어가 필요한데, 이 부분은 검증 못 했습니다.)
#
# 사용법:
#   ENERGYPLUS2_HOST=<이 머신 자신의 IP, EnergyPlus#2가 native로 도는 주소> \
#   docker compose up -d --build

networks:
  hils_net_c:
    driver: bridge

services:

  signaling:
    build:
      context: https://github.com/VILLASframework/signaling.git
    container_name: hils-signaling-c
    networks:
      - hils_net_c
    ports:
      - "8080:8080"   # Host 2의 webrtc_a 가 이 포트로 접속
    restart: unless-stopped

  gateway_c:
    image: registry.git.rwth-aachen.de/acs/public/villas/node:latest
    container_name: hils-gateway-c
    networks:
      - hils_net_c
    depends_on:
      - signaling
    environment:
      - ENERGYPLUS2_HOST=${ENERGYPLUS2_HOST:?ENERGYPLUS2_HOST를 지정하세요}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 리눅스에서 컨테이너->호스트 접근용
    ports:
      - "22003:22003/udp"   # EnergyPlus#2 -> gateway_c 수신
      - "8082:8080"          # 디버그용 http API
    volumes:
      - ./gateway_c/config:/config:ro
    command: ["node", "/config/hils_gw_c.conf"]
    restart: unless-stopped
