#############################################################################
# hils_gw_c.conf — VILLASnode #2 (config/VILLASnode.2), CORE 안의 gw2 컨테이너
#
# webrtc_c 로 VILLASnode #1(config/VILLASnode.1)의 webrtc_a 와 WebRTC 연결.
# ep_c 로 EnergyPlus #2(192.168.239.185, 기존 MATLAB/EnergyPlus#1과 같은 곳,
# 포트만 22001/22003으로 분리)와 통신.
#############################################################################

stats = 1
http = { enabled = true, port = 8080 }
logging = { level = "info" }

nodes = {

    webrtc_c = {
        type    = "webrtc"
        session = "hils_special_proposal"   # VILLASnode.1 의 webrtc_a 와 반드시 동일
        peer    = "site_c"

        # ⚠️ 아래 IP는 core_wan_topology.py 실행 후 콘솔에 찍히는
        #    "signaling sigC=..." 값으로 바꿔 넣으세요.
        #    (CORE 노드의 IP는 세션 내 노드 순번에 따라 정해져서 미리 하드코딩 불가)
        server  = "ws://<CORE 실행 후 확인한 signaling sigC IP>:8080"

        format = "villas.human"
        ice = { servers = () }

        in = {
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
        out = {
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }
    }

    # ── EnergyPlus #2 (192.168.239.185, 기존 MATLAB/EnergyPlus#1과 동일 호스트) ──
    ep_c = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:22003"           # EnergyPlus#2 -> gw2 수신 바인드
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }
        out = {
            address = "192.168.239.185:22001"   # gw2 -> EnergyPlus#2 송신 목적지 (하드코딩)
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
    }
}

paths = (
    { in = "webrtc_c", out = "ep_c",
      hooks = ( { type = "lua", script = "/config/hooks/webrtc_to_ep_c.lua", use_names = false } ) },

    { in = "ep_c", out = "webrtc_c",
      hooks = ( { type = "lua", script = "/config/hooks/ep_c_to_webrtc.lua", use_names = false } ) }
)