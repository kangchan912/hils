#############################################################################
# hils.conf — VILLASnode #2 설정 (config#2, 호스트 192.168.239.186)
#
# webrtc_c : config#1(기존 VILLASnode)의 webrtc_a 와 WebRTC로 연결
# ep_c     : EnergyPlus #2 (기존 MATLAB/EnergyPlus#1과 같은 호스트 192.168.239.185,
#            포트만 22001/22003으로 분리 — 기존 EnergyPlus#1의 12001/12003과 충돌 방지)
#
# signaling 컨테이너는 이 VILLASnode #2 와 같은 호스트(192.168.239.186)의
# docker-compose 안에서 같은 브리지 네트워크로 떠서, 컨테이너 DNS 이름
# "signaling" 로 바로 접근 가능 (server = ws://signaling:8080).
#############################################################################

stats = 1

http = {
    enabled = true
    port    = 8080
}

logging = {
    level = "info"
}

nodes = {

    # ── [신규] config#1(기존 VILLASnode) 방향 WebRTC ──────────────────
    webrtc_c = {
        type    = "webrtc"
        session = "hils_special_proposal"   # config#1 의 webrtc_a 와 반드시 동일
        peer    = "site_c"
        server  = "ws://signaling:8080"      # 같은 호스트(192.168.239.186) 안 signaling 컨테이너

        format = "villas.human"
        ice = { servers = () }

        in = {
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
        out = {
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }
    }

    # ── EnergyPlus #2 (기존 MATLAB/EnergyPlus#1과 같은 호스트) ────────
    # ep_socket_sim.py 코드 변경 없이 재사용, 포트만 22001/22003 으로 분리
    ep_c = {
        type   = "socket"
        layer  = "udp"
        format = "villas.human"

        in = {
            address = "0.0.0.0:22003"            # EnergyPlus#2 -> VILLASnode#2 수신 바인드
            signals = (
                { name = "indoor_temp", type = "float", unit = "degC" },
                { name = "hvac_power",  type = "float", unit = "W"    }
            )
        }
        out = {
            address = "192.168.239.185:22001"    # VILLASnode#2 -> EnergyPlus#2 송신 목적지
            signals = (
                { name = "outdoor_temp",     type = "float", unit = "degC" },
                { name = "solar_rad",        type = "float", unit = "W/m2" },
                { name = "rel_humidity",     type = "float", unit = "pct"  },
                { name = "cooling_setpoint", type = "float", unit = "degC" }
            )
        }
    }
}

paths = (

    # config#1 에서 넘어온 Lab A 값 -> EnergyPlus#2 (기존 lab_a_to_ep.lua clamp 재사용)
    { in = "webrtc_c", out = "ep_c",
      hooks = ( { type = "lua", script = "/config/hooks/webrtc_to_ep_c.lua", use_names = false } ) },

    # EnergyPlus#2 결과 -> config#1 방향으로 되돌림 (기존 ep_to_lab_a.lua 로직 재사용)
    { in = "ep_c", out = "webrtc_c",
      hooks = ( { type = "lua", script = "/config/hooks/ep_c_to_webrtc.lua", use_names = false } ) }
)